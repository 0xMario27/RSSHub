name: Build and Push Truth Social RSSHub

on:
  push:
    branches:
      - master
    paths:
      - 'lib/routes/truthsocial/**'
      - 'scripts/docker/minify-docker.js'
      - 'Dockerfile'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docker-truthsocial.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/rsshub-truthsocial

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to ghcr.io
        uses: docker/login-action@74a5d142397b44f367a81161e628507b301038cc # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf3e834b20ce9dd61e179d85d5a # v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@471f46cf2ee3b612447426baadf15186e0fe1914 # v6.15.0
        with:
          context: .
          build-args: |
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=0
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
