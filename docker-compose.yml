services:
  # For local dev: docker compose build && docker compose up
  # For production: just use docker run with ghcr.io image
  rsshub:
    build:
      context: .
      args:
        PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "0"
    # Or use pre-built image:
    # image: ghcr.io/0xmario27/rsshub-truthsocial:latest
    container_name: rsshub
    ports:
      - "1200:1200"
    environment:
      # Optional: proxy for geo-blocked regions
      # TRUTHSOCIAL_PROXY: http://host.docker.internal:6152
    restart: unless-stopped
